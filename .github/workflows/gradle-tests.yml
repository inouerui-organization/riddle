name: Gradle Tests

# プルリクエストが作成または更新された時にトリガー
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  # 通常のJUnitなどのテストを実行するジョブ
  test_task:
    runs-on: ubuntu-latest
    steps:
      # GitHubのリポジトリからコードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v3

      # JDK 21（Amazon Corretto）をセットアップ
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      # Gradleの依存関係をキャッシュしてビルド高速化
      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Gradleの test タスクを実行
      - name: Run Gradle tests
        run: ./gradlew test --no-daemon

  # ArchUnitによるアーキテクチャテストを実行するジョブ
  archunit_test:
    runs-on: ubuntu-latest
    steps:
      # コードをチェックアウト
      - name: Checkout code
        uses: actions/checkout@v3

      # JDK 21 をセットアップ
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      # Gradleのキャッシュ
      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Gradleの archunitTest タスクを実行
      - name: Run ArchUnit tests
        run: ./gradlew archunitTest --no-daemon
