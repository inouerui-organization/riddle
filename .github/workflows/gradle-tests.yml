name: Gradle Tests

on:
  pull_request:
    types: [opened, synchronize]  # プルリクエストが作成または更新された時にトリガー

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # プロジェクトをGitHubからチェックアウト
      - name: Checkout code
        uses: actions/checkout@v3

      # JDK 21 (Corretto)をセットアップ
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      # Gradleの依存関係をキャッシュして、ビルド時間を短縮
      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Gradleのビルドを実行 (testタスク)
      - name: Build with Gradle
        run: ./gradlew build --no-daemon

  test_task:
    runs-on: ubuntu-latest
    steps:
      # プロジェクトをGitHubからチェックアウト
      - name: Checkout code
        uses: actions/checkout@v3

      # JDK 21 (Corretto)をセットアップ
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      # Gradleの依存関係をキャッシュして、ビルド時間を短縮
      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Gradleのテストタスクを実行 (testタスク)
      - name: Run Gradle tests
        run: ./gradlew test --no-daemon

  archunit_test:
    runs-on: ubuntu-latest
    steps:
      # プロジェクトをGitHubからチェックアウト
      - name: Checkout code
        uses: actions/checkout@v3

      # JDK 21 (Corretto)をセットアップ
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'

      # Gradleの依存関係をキャッシュして、ビルド時間を短縮
      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ArchUnitテストを実行
      - name: Run ArchUnit tests
        run: ./gradlew archunitTest --no-daemon
